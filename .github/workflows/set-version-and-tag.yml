name: Set Version And Create Tag

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version (format: v.X.Y.Z)"
        required: true
      branch:
        description: "Target branch"
        required: true
        default: "main"

jobs:
  set-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 0

      - name: Validate version format
        run: |
          VERSION=${{ github.event.inputs.version }}
          if [[ ! $VERSION =~ ^v\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format. Use v.X.Y.Z (e.g., v.1.2.3)"
            exit 1
          fi

      - name: Check tag not exists
        run: |
          VERSION=${{ github.event.inputs.version }}
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists!"
            exit 1
          fi

      - name: Extract version
        id: extract
        run: |
          VERSION=${{ github.event.inputs.version }}
          CLEAN_VERSION=${VERSION#v.}
          echo "version=$CLEAN_VERSION" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update package.json version
        run: |
          npm pkg set version=${{ steps.extract.outputs.version }}

      - name: Update skills metadata.json version
        run: |
          VERSION=${{ steps.extract.outputs.version }}
          for file in skills/*/metadata.json; do
            if [ -f "$file" ]; then
              sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" "$file"
              echo "Updated $file to version $VERSION"
            fi
          done

      - name: Commit version update
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git commit -am "Release ${{ github.event.inputs.version }}"
          git push origin ${{ github.event.inputs.branch }}

      - name: Create tag
        run: |
          git tag ${{ github.event.inputs.version }}
          git push origin ${{ github.event.inputs.version }}
